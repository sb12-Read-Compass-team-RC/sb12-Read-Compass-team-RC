spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/readcompass}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:user1}
    password: ${DB_PASSWORD:1234}

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.web: info
    com.rc.readcompass: debug


app:
  frontend:
    auth-success-url: http://localhost:8080/#/oauth/callback
    auth-failure-url: http://localhost:8080/#/auth/error
  jwt:
    access-expire-ms: 60000      # 1분
    refresh-expire-ms: 300000    # 5분
  cookie:
    secure: false
    same-site: Lax
    refresh-max-age: 300         # 5분(초)
